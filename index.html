<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeartUp - サッカー療育支援システム</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">
                <img src="soccerball.png" alt="サッカーボール" class="ball-icon-img">
                <h1>HeartUp</h1>
            </div>
            <p class="subtitle">サッカー療育支援システム - デモ版</p>
            <div class="header-right">
                <div class="version-badge">v1.0.3</div>
            </div>
        </div>
    </header>

    <main>
        <div class="tab-container">
            <div class="tabs">
                <button class="tab-button active" data-tab="resources">
                    資料閲覧
                </button>
                <button class="tab-button" data-tab="practice-menu">
                    練習メニュー
                </button>
                <button class="tab-button" data-tab="ai-assessment">
                    AIアセスメント書類作成
                </button>
            </div>

            <!-- 資料閲覧タブ -->
            <div id="resources" class="tab-content active">
                <div class="search-section">
                    <h2>勉強会資料を検索</h2>
                    <div class="search-controls">
                        <input type="text" id="searchInput" placeholder="キーワードを入力...">
                        <div class="category-tabs">
                            <button class="category-btn active" data-category="all">すべて</button>
                            <button class="category-btn" data-category="soccer">サッカー療育</button>
                            <button class="category-btn" data-category="aba">応用行動分析</button>
                            <button class="category-btn" data-category="case">事例研究</button>
                        </div>
                    </div>
                </div>

                <div class="resources-grid" id="resourcesGrid">
                    <!-- 資料カードがここに表示されます -->
                </div>
            </div>

            <!-- 練習メニュータブ -->
            <div id="practice-menu" class="tab-content">
                <div class="search-section">
                    <h2>練習メニューを検索</h2>
                    <div class="search-controls">
                        <input type="text" id="practiceSearchInput" placeholder="メニュー名を検索...">
                        <div class="category-tabs">
                            <button class="practice-category-btn active" data-category="all">すべて</button>
                            <button class="practice-category-btn" data-category="warmup">ウォーミングアップ</button>
                            <button class="practice-category-btn" data-category="dribble">ドリブル</button>
                            <button class="practice-category-btn" data-category="shoot">シュート</button>
                            <button class="practice-category-btn" data-category="match">対人・試合</button>
                            <button class="practice-category-btn" data-category="game">ゲーム</button>
                            <button class="practice-category-btn" data-category="concentration">集中力強化</button>
                            <button class="practice-category-btn" data-category="switching">切り替え強化</button>
                            <button class="practice-category-btn" data-category="competition">勝ち負け</button>
                            <button class="practice-category-btn" data-category="vestibular">前庭覚刺激</button>
                            <button class="practice-category-btn" data-category="proprioceptive">固有覚刺激</button>
                            <button class="practice-category-btn" data-category="tactile">触覚刺激</button>
                            <button class="practice-category-btn" data-category="flexibility">柔軟性（稼働域）</button>
                            <button class="practice-category-btn" data-category="bodyimage">ボディイメージ</button>
                            <button class="practice-category-btn" data-category="balance">バランス</button>
                        </div>
                    </div>
                </div>

                <div style="margin: 1rem 0; text-align: right;">
                    <button class="btn-upload" onclick="showPracticeUploadForm()">+ メニューを追加</button>
                </div>

                <div class="practice-grid" id="practiceGrid">
                    <!-- 練習メニューカードがここに表示されます -->
                </div>
            </div>

            <!-- AIアセスメント書類作成タブ -->
            <div id="ai-assessment" class="tab-content">
                <div class="ai-tabs-container">
                    <div class="ai-tabs">
                        <button class="ai-tab-button active" data-ai-tab="am-children">
                            <span class="ai-tab-text">児童一覧</span>
                        </button>
                        <button class="ai-tab-button" data-ai-tab="am-new-assessment">
                            <span class="ai-tab-text">新規アセスメント作成</span>
                        </button>
                        <button class="ai-tab-button" data-ai-tab="am-assessments">
                            <span class="ai-tab-text">アセスメント一覧</span>
                        </button>
                        <button class="ai-tab-button" data-ai-tab="am-plans">
                            <span class="ai-tab-text">支援計画一覧</span>
                        </button>
                        <button class="ai-tab-button" data-ai-tab="am-records">
                            <span class="ai-tab-text">成長記録一覧</span>
                        </button>
                        <button class="ai-tab-button" data-ai-tab="batch-record">
                            <span class="ai-tab-text">一括記録作成</span>
                        </button>
                        <button class="ai-tab-button" data-ai-tab="csv-import">
                            <span class="ai-tab-text">CSVインポート</span>
                        </button>
                    </div>

                    <!-- 児童一覧 (default) -->
                    <div id="ai-am-children" class="ai-tab-content active">
                        <div id="amLocationBar" style="text-align:center; margin-bottom:20px; padding:12px; background:rgba(255,255,255,0.95); border-radius:12px;">
                            <p id="amLocationInfo" style="color:#2e7d32; font-size:0.9rem; font-weight:bold;"></p>
                        </div>
                        <div class="am-children-list">
                            <h2 style="color:#2e7d32; margin-bottom:20px; font-size:24px;">登録児童一覧 <span id="amChildrenCount" style="color:#666; font-size:14px;"></span></h2>
                            <div class="am-filter-section">
                                <input type="text" id="amNameSearch" placeholder="名前で検索..." oninput="amFilterChildren()">
                                <select id="amGradeFilter" onchange="amFilterChildren()">
                                    <option value="">全学年</option>
                                </select>
                                <select id="amLocationFilter" onchange="amFilterChildren()">
                                    <option value="">全拠点</option>
                                </select>
                                <div style="display: flex; align-items: center; gap: 0.5rem;">
                                    <span style="font-size: 0.85rem; color: #666;">並び替え:</span>
                                    <select id="amSortSelect" onchange="amChangeSortOrder(this.value)" style="padding: 0.5rem; font-size: 0.85rem; border: 1px solid #ddd; border-radius: 4px;">
                                        <option value="name">名前順（50音）</option>
                                        <option value="grade">学年順</option>
                                        <option value="recent">最近追加順</option>
                                        <option value="location">拠点順</option>
                                    </select>
                                </div>
                            </div>
                            <div id="amChildrenContainer">
                                <div class="am-empty-state">
                                    <h3>読み込み中...</h3>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 新規アセスメント作成 -->
                    <div id="ai-am-new-assessment" class="ai-tab-content">
                        <div class="ai-tool-description">
                            <h3>新規アセスメント作成</h3>
                            <p>新しいお子様のアセスメントシートを作成します。フォームページに移動します。</p>
                        </div>
                        <div style="text-align:center; padding:40px;">
                            <button class="submit-btn" onclick="window.location.href='assessment/form-simple.html'" style="padding:16px 48px; font-size:18px; background:linear-gradient(135deg,#4caf50,#66bb6a); color:white; border:none; border-radius:50px; cursor:pointer; font-weight:bold;">アセスメントフォームを開く</button>
                        </div>
                    </div>

                    <!-- アセスメント一覧 -->
                    <div id="ai-am-assessments" class="ai-tab-content">
                        <div id="amAssessmentListContent">
                            <div class="am-empty-state"><h3>読み込み中...</h3></div>
                        </div>
                    </div>

                    <!-- 支援計画一覧 -->
                    <div id="ai-am-plans" class="ai-tab-content">
                        <div id="amPlanListContent">
                            <div class="am-empty-state"><h3>読み込み中...</h3></div>
                        </div>
                    </div>

                    <!-- 成長記録一覧 -->
                    <div id="ai-am-records" class="ai-tab-content">
                        <div id="amRecordListContent">
                            <div class="am-empty-state"><h3>読み込み中...</h3></div>
                        </div>
                    </div>

                    <!-- 一括記録作成 (from current AI tools) -->
                    <div id="ai-batch-record" class="ai-tab-content">
                        <div class="ai-tool-description">
                            <h3>一括記録作成</h3>
                            <p>複数の児童の記録を一度に作成できます。日付と活動を設定後、参加児童を選択して記録を入力します。</p>
                        </div>
                        <div id="batchRecordContent"></div>
                    </div>

                    <!-- CSVインポート -->
                    <div id="ai-csv-import" class="ai-tab-content">
                        <div class="ai-tool-description">
                            <h3>CSVインポート</h3>
                            <p>CSVファイルから児童情報、支援計画、活動記録をまとめてインポートできます。</p>
                        </div>
                        <div id="csvImportContent"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- モーダル -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-button" onclick="closeModal()">&times;</span>
            <div id="modalBody">
                <!-- モーダルの内容がここに表示されます -->
            </div>
        </div>
    </div>

    <!-- Assessment Manager Modal -->
    <div id="amAssessmentModal" class="am-modal">
        <div class="am-modal-content">
            <span class="am-close-modal" onclick="amCloseModal()">&times;</span>
            <div id="amAssessmentContent"></div>
        </div>
    </div>

    <!-- 外部スクリプトの読み込み順序重要 -->
    <!-- html2pdf.js for PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <!-- config.jsは存在する場合のみ読み込む（デプロイ時に自動生成される） -->
    <script>
        // 最初に空のAPI_CONFIGを定義（デフォルト値）
        window.API_CONFIG = {
            GEMINI_API_KEY: '',
            MODEL_NAME: 'gemini-2.0-flash-exp'
        };
        window.FIREBASE_CONFIG = { apiKey: '', authDomain: '', projectId: '' };
    </script>
    <script src="config.js?v=20260419" onerror="console.log('config.js not found - using default API_CONFIG')"></script>
    <script src="firebase-client.js?v=20260419"></script>
    <script src="data-adapter.js?v=20260419"></script>
    <script src="auth-guard.js?v=20260419"></script>
    <script src="gemini-api.js?v=20260419"></script>
    <script src="csv-importer.js?v=20260419"></script>
    <script src="markdown-renderer.js?v=20260419"></script>
    <script src="assessment-manager.js?v=20260419"></script>
    <script src="script.js?v=20260419"></script>
    <script>
        // Firebase初期化 + 認証ガード
        heartUpDB.init();
        authGuard.init();
    </script>
</body>
</html>
