<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カラーズFC アセスメント管理システム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Yu Gothic', 'Meiryo', sans-serif;
            background: linear-gradient(135deg, #2e7d32 0%, #4caf50 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .main-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .action-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .action-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.2);
        }

        .action-card h3 {
            color: #2e7d32;
            margin-bottom: 10px;
            font-size: 20px;
        }

        .action-card p {
            color: #666;
            font-size: 14px;
        }

        .children-list {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 30px;
            margin-bottom: 20px;
        }

        .children-list h2 {
            color: #2e7d32;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .child-item {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 20px;
            align-items: center;
            transition: border-color 0.3s;
        }

        .child-item:hover {
            border-color: #4caf50;
        }

        .child-info h3 {
            color: #333;
            margin-bottom: 8px;
        }

        .child-info p {
            color: #666;
            font-size: 14px;
            margin: 4px 0;
        }

        .child-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: opacity 0.3s;
        }

        .btn:hover {
            opacity: 0.8;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4caf50 0%, #66bb6a 100%);
            color: white;
        }

        .btn-secondary {
            background: #4caf50;
            color: white;
        }

        .btn-tertiary {
            background: #ff9800;
            color: white;
        }

        .btn-quaternary {
            background: #2196f3;
            color: white;
        }

        .btn-danger-small {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ef9a9a;
            padding: 0.4rem 0.6rem;
            font-size: 0.9rem;
            min-width: auto;
        }

        .btn-danger-small:hover {
            background: #ffcdd2;
            opacity: 1;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 12px;
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
            width: 90%;
        }

        .modal-content h2 {
            color: #2e7d32;
            margin-bottom: 20px;
        }

        .close-modal {
            float: right;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }

        .close-modal:hover {
            color: #333;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 10px;
        }

        /* 一覧表示スタイル */
        .list-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .list-item:hover {
            background: #e8f5e9;
            border-color: #4caf50;
        }

        .list-item-info h4 {
            color: #333;
            margin-bottom: 5px;
        }

        .list-item-info p {
            color: #666;
            font-size: 13px;
            margin: 2px 0;
        }

        .list-item-actions {
            display: flex;
            gap: 10px;
        }

        @media print {
            body {
                background: white;
                padding: 0;
                min-height: auto;
            }

            .container > header,
            .main-actions,
            .children-list,
            .close-modal {
                display: none !important;
            }

            .modal {
                display: block !important;
                position: static;
                background: none;
                width: 100%;
                height: auto;
            }

            .modal-content {
                max-width: 100%;
                max-height: none;
                overflow: visible;
                width: 100%;
                padding: 0;
                border-radius: 0;
                box-shadow: none;
            }
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 28px;
            }

            .child-item {
                grid-template-columns: 1fr;
            }

            .child-actions {
                justify-content: flex-start;
            }

            .list-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .list-item-actions {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>カラーズFC アセスメント管理システム</h1>
            <p>お子様の特性管理・支援計画・日々の記録を一元管理</p>
        </header>

        <div class="main-actions">
            <div class="action-card" onclick="window.location.href='assessment/form-simple.html'">
                <h3>新規アセスメント作成</h3>
                <p>新しいお子様のアセスメントシートを作成します</p>
            </div>
            <div class="action-card" onclick="showAllAssessments()">
                <h3>アセスメント一覧</h3>
                <p>登録済みのアセスメントシートを確認します</p>
            </div>
            <div class="action-card" onclick="showAllSupportPlans()">
                <h3>支援計画一覧</h3>
                <p>作成済みの支援計画を確認します</p>
            </div>
            <div class="action-card" onclick="showAllReports()">
                <h3>成長記録一覧</h3>
                <p>日々の記録と成長の振り返りを確認します</p>
            </div>
        </div>

        <div class="children-list">
            <h2>登録児童一覧</h2>
            <div id="childrenContainer">
                <div class="empty-state">
                    <h3>まだ登録されている児童はいません</h3>
                    <p>「新規アセスメント作成」から始めてください</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for viewing assessment -->
    <div id="assessmentModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('assessmentModal')">&times;</span>
            <div id="assessmentContent"></div>
        </div>
    </div>

    <!-- html2pdf.js for PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <!-- config.jsは存在する場合のみ読み込む（デプロイ時に自動生成される） -->
    <script>
        // 最初に空のAPI_CONFIGを定義（デフォルト値）
        window.API_CONFIG = {
            GEMINI_API_KEY: '',
            MODEL_NAME: 'gemini-2.0-flash-exp'
        };
    </script>
    <script src="config.js" onerror="console.log('config.js not found - using default API_CONFIG')"></script>
    <script src="google-drive-api.js"></script>
    <script src="gemini-api.js"></script>
    <script>
        // APIキーを読み込み
        document.addEventListener('DOMContentLoaded', async function() {
            geminiAPI.loadApiKey();
            loadChildren();

            // Google Driveから自動同期を試みる
            await silentDriveSync();
        });

        /**
         * ページ読み込み時にサイレントにGoogle Driveからデータを同期
         * ポップアップは出さない。未認証ならメッセージだけ表示
         */
        async function silentDriveSync() {
            if (typeof googleDriveAPI === 'undefined') return;

            try {
                // API初期化（ポップアップなし）
                if (!googleDriveAPI.isInitialized()) {
                    const ok = await googleDriveAPI.initialize();
                    if (!ok) { showDriveHint(); return; }
                }

                // トークン復元（ポップアップなし）
                const hasToken = googleDriveAPI.restoreToken();
                if (!hasToken) { showDriveHint(); return; }

                // トークンが本当に有効か検証（userinfo API）
                try {
                    const token = gapi.client.getToken();
                    const resp = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
                        headers: { 'Authorization': 'Bearer ' + token.access_token }
                    });
                    if (!resp.ok) {
                        console.warn('トークン無効 → 再認証が必要');
                        googleDriveAPI.clearPersistedToken();
                        googleDriveAPI.isSignedIn = false;
                        showDriveHint();
                        return;
                    }
                } catch (e) {
                    showDriveHint();
                    return;
                }

                // フォルダIDを確認
                let targetFolderId = googleDriveAPI.getTargetFolderId();
                if (!targetFolderId) {
                    const settings = JSON.parse(localStorage.getItem('userSettings') || '{}');
                    if (settings.folderId) {
                        googleDriveAPI.setTargetFolderId(settings.folderId);
                        targetFolderId = settings.folderId;
                    }
                }
                if (!targetFolderId) {
                    try {
                        const driveConfig = await googleDriveAPI.loadConfigFromDrive();
                        if (driveConfig && driveConfig.targetFolderId) {
                            const s = JSON.parse(localStorage.getItem('userSettings') || '{}');
                            s.folderId = driveConfig.targetFolderId;
                            s.folderName = driveConfig.targetFolderName || '';
                            localStorage.setItem('userSettings', JSON.stringify(s));
                            googleDriveAPI.setTargetFolderId(driveConfig.targetFolderId);
                            targetFolderId = driveConfig.targetFolderId;
                        }
                    } catch (e) {
                        console.warn('Drive設定読み込みスキップ:', e);
                    }
                }
                if (!targetFolderId) { showDriveHint(); return; }

                // 同期実行
                showSyncStatus('同期中...');
                const result = await googleDriveAPI.syncAllStudentData();
                if (result.success) {
                    const settings = JSON.parse(localStorage.getItem('userSettings') || '{}');
                    showSyncComplete(result.syncedStudents.length, settings.email, settings.folderName || targetFolderId);
                    loadChildren();
                } else {
                    // 同期失敗 → 設定ボタンを表示
                    showDriveHintWithError('同期に失敗しました。再接続してください。');
                }
            } catch (error) {
                console.error('Drive同期エラー:', error);
                showDriveHintWithError('同期エラーが発生しました。再接続してください。');
            }
        }

        /**
         * エラーメッセージ付きの設定ボタン表示
         */
        function showDriveHintWithError(msg) {
            showDriveHint();
            const statusEl = document.getElementById('driveSetupStatus');
            if (statusEl) {
                statusEl.textContent = msg;
                statusEl.style.color = '#e53935';
            }
        }

        /**
         * Drive未連携時の設定ボタン表示
         */
        function showDriveHint() {
            let syncBar = document.getElementById('driveSyncBar');
            if (!syncBar) {
                const container = document.querySelector('.container');
                const actionsDiv = document.querySelector('.main-actions');
                syncBar = document.createElement('div');
                syncBar.id = 'driveSyncBar';
                container.insertBefore(syncBar, actionsDiv);
            }
            syncBar.style.cssText = 'text-align:center; margin-bottom:20px; padding:16px; background:rgba(255,255,255,0.95); border-radius:12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);';
            syncBar.innerHTML = `
                <p style="color:#666; font-size:0.9rem; margin-bottom:12px;">Google Driveと連携すると、別端末とデータを同期できます</p>
                <button id="driveSetupBtn" onclick="setupGoogleDriveFromAssessment()" style="
                    display:inline-flex; align-items:center; gap:8px;
                    padding:10px 24px; border:none; border-radius:8px;
                    background:#4285F4; color:white; font-size:0.95rem;
                    font-weight:bold; cursor:pointer; transition: background 0.2s;
                ">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="white">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill-opacity="0.7"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill-opacity="0.7"/>
                    </svg>
                    <span id="driveSetupBtnText">Google Driveを設定</span>
                </button>
                <div id="driveSetupStatus" style="margin-top:8px; font-size:0.85rem; color:#666;"></div>
            `;
        }

        /**
         * assessment-manager.htmlからフル設定: ログイン → フォルダ自動検出/選択 → 同期
         */
        async function setupGoogleDriveFromAssessment() {
            const btn = document.getElementById('driveSetupBtn');
            const btnText = document.getElementById('driveSetupBtnText');
            const statusEl = document.getElementById('driveSetupStatus');
            if (btn) btn.disabled = true;
            if (statusEl) statusEl.textContent = '';

            try {
                // Step 1: 初期化（ポップアップは開かない。silentDriveSyncで済んでいるはず）
                if (!googleDriveAPI.isInitialized()) {
                    if (btnText) btnText.textContent = '初期化中...';
                    await googleDriveAPI.initialize();
                }

                // Step 2: 認証（ボタンクリック直後にauthorize()を呼び、ポップアップブロックを回避）
                if (btnText) btnText.textContent = 'ログイン中...';
                if (!(googleDriveAPI.isSignedIn && typeof gapi !== 'undefined' && gapi.client && gapi.client.getToken())) {
                    await googleDriveAPI.authorize();
                }

                // Step 3: メールアドレス取得
                const email = await googleDriveAPI.getCurrentUserEmail();
                if (email) {
                    const s = JSON.parse(localStorage.getItem('userSettings') || '{}');
                    s.email = email;
                    localStorage.setItem('userSettings', JSON.stringify(s));
                    if (statusEl) statusEl.textContent = email + ' でログイン済み';
                }

                // Step 4: フォルダ設定を確認（localStorage → Drive設定ファイル）
                let folderId = null;
                let folderName = null;
                if (btnText) btnText.textContent = '設定を確認中...';

                // まずlocalStorageから
                const localSettings = JSON.parse(localStorage.getItem('userSettings') || '{}');
                if (localSettings.folderId) {
                    folderId = localSettings.folderId;
                    folderName = localSettings.folderName || '';
                }

                // localStorageになければDriveから
                if (!folderId) {
                    try {
                        const driveConfig = await googleDriveAPI.loadConfigFromDrive();
                        if (driveConfig && driveConfig.targetFolderId) {
                            folderId = driveConfig.targetFolderId;
                            folderName = driveConfig.targetFolderName || '';
                        }
                    } catch (e) {
                        console.warn('Drive設定読み込みスキップ:', e);
                    }
                }

                // Step 5: フォルダが未設定ならPickerで選択
                if (!folderId) {
                    if (btnText) btnText.textContent = 'フォルダを選択...';
                    await googleDriveAPI.ensurePickerReady();
                    const selected = await new Promise((resolve) => {
                        googleDriveAPI.openFolderPicker((id, name, error) => {
                            if (error) resolve({ error });
                            else if (id) resolve({ folderId: id, folderName: name });
                            else resolve(null);
                        });
                    });

                    if (selected && selected.error) {
                        if (statusEl) statusEl.textContent = 'フォルダ選択エラー: ' + selected.error;
                        return;
                    }
                    if (!selected) {
                        if (statusEl) statusEl.textContent = 'フォルダ選択がキャンセルされました';
                        return;
                    }
                    folderId = selected.folderId;
                    folderName = selected.folderName;

                    // Driveに設定を保存（他端末共有用）
                    try {
                        await googleDriveAPI.saveConfigToDrive({
                            targetFolderId: folderId,
                            targetFolderName: folderName,
                            updatedAt: new Date().toISOString()
                        });
                    } catch (e) {
                        console.warn('Drive設定保存スキップ:', e);
                    }
                }

                // Step 6: フォルダ設定をローカルに保存
                const settings = JSON.parse(localStorage.getItem('userSettings') || '{}');
                settings.folderId = folderId;
                settings.folderName = folderName;
                localStorage.setItem('userSettings', JSON.stringify(settings));
                googleDriveAPI.setTargetFolderId(folderId);

                // Step 7: データ同期
                if (btnText) btnText.textContent = 'データを同期中...';
                const result = await googleDriveAPI.syncAllStudentData();
                if (result.success) {
                    loadChildren();
                    showSyncComplete(result.syncedStudents.length, email, folderName || folderId);
                } else {
                    showSyncStatus('同期に失敗しました', false);
                }
            } catch (error) {
                console.error('Google Drive設定エラー:', error);
                if (statusEl) statusEl.textContent = 'エラー: ' + error.message;
                showSyncStatus('設定エラーが発生しました', false);
            } finally {
                if (btn) btn.disabled = false;
                if (btnText && btnText.textContent.includes('...')) {
                    btnText.textContent = 'Google Driveを設定';
                }
            }
        }

        /**
         * 同期完了時の表示（設定変更ボタン付き）
         */
        function showSyncComplete(count, email, folderName) {
            let syncBar = document.getElementById('driveSyncBar');
            if (!syncBar) {
                const container = document.querySelector('.container');
                const actionsDiv = document.querySelector('.main-actions');
                syncBar = document.createElement('div');
                syncBar.id = 'driveSyncBar';
                container.insertBefore(syncBar, actionsDiv);
            }
            syncBar.style.cssText = 'text-align:center; margin-bottom:20px; padding:12px; background:rgba(255,255,255,0.95); border-radius:12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);';
            syncBar.innerHTML = `
                <p style="color:#2e7d32; font-size:0.9rem; font-weight:bold;">Google Drive同期完了（${count}名）</p>
                <p style="color:#666; font-size:0.85rem; margin-top:4px;">${email || ''} ${folderName ? '| フォルダ: ' + folderName : ''}</p>
                <div style="margin-top:8px;">
                    <button onclick="silentDriveSync()" style="
                        margin-right:8px; padding:5px 14px; border:1px solid #4caf50; border-radius:6px;
                        background:white; color:#4caf50; font-size:0.85rem; cursor:pointer;
                    ">再同期</button>
                    <button onclick="setupGoogleDriveFromAssessment()" style="
                        padding:5px 14px; border:1px solid #ccc; border-radius:6px;
                        background:white; color:#666; font-size:0.85rem; cursor:pointer;
                    ">設定を変更</button>
                </div>
            `;
            // 3秒後に自動で小さく
            setTimeout(() => {
                if (syncBar && syncBar.parentNode) {
                    syncBar.style.padding = '8px';
                    const details = syncBar.querySelectorAll('p:nth-child(2), div');
                    details.forEach(el => { if (el.tagName === 'DIV') el.style.display = 'none'; });
                }
            }, 5000);
        }

        /**
         * 同期ステータス表示
         */
        function showSyncStatus(message, success) {
            let syncBar = document.getElementById('driveSyncBar');
            if (!syncBar) {
                const container = document.querySelector('.container');
                const actionsDiv = document.querySelector('.main-actions');
                syncBar = document.createElement('div');
                syncBar.id = 'driveSyncBar';
                container.insertBefore(syncBar, actionsDiv);
            }
            const color = success === true ? '#2e7d32' : success === false ? '#e53935' : '#666';
            syncBar.style.cssText = 'text-align:center; margin-bottom:20px; padding:10px; background:rgba(255,255,255,0.9); border-radius:12px;';
            syncBar.innerHTML = `<p style="color:${color}; font-size:0.9rem;">${message}</p>`;
            if (success === true) {
                setTimeout(() => { if (syncBar.parentNode) syncBar.remove(); }, 3000);
            }
        }

        // Load and display children
        function loadChildren() {
            const assessments = JSON.parse(localStorage.getItem('assessments') || '{}');
            const container = document.getElementById('childrenContainer');

            if (Object.keys(assessments).length === 0) {
                return;
            }

            container.innerHTML = '';

            Object.entries(assessments).forEach(([fileName, assessment]) => {
                const childData = assessment.data;
                const childItem = document.createElement('div');
                childItem.className = 'child-item';
                childItem.innerHTML = `
                    <div class="child-info">
                        <h3>${childData.childName}（${childData.childNameKana}）</h3>
                        <p>生年月日: ${childData.birthDate} | 性別: ${childData.gender || '未回答'}</p>
                        <p>診断名: ${childData.diagnosis || 'なし'}</p>
                        <p>登録日: ${new Date(assessment.createdAt).toLocaleDateString('ja-JP')}</p>
                    </div>
                    <div class="child-actions">
                        <button class="btn btn-primary" onclick="viewAssessment('${fileName}')">アセスメント表示</button>
                        <button class="btn btn-secondary" onclick="generateSupportPlan('${fileName}')">支援計画作成</button>
                        <button class="btn btn-tertiary" onclick="createDailyReport('${fileName}')">日々の記録</button>
                        <button class="btn btn-quaternary" onclick="createReview('${fileName}')">成長振り返り</button>
                    </div>
                `;
                container.appendChild(childItem);
            });
        }

        window.viewAssessment = function(fileName) {
            const assessments = JSON.parse(localStorage.getItem('assessments') || '{}');
            const assessment = assessments[fileName];

            const modal = document.getElementById('assessmentModal');
            const content = document.getElementById('assessmentContent');
            content.innerHTML = assessment.html;
            modal.classList.add('active');
        };

            const modal = document.getElementById('assessmentModal');

            if (Object.keys(assessments).length === 0) {
                content.innerHTML = `
                    <h2>アセスメント一覧</h2>
                    <div class="empty-state">
                        <h3>登録されているアセスメントはありません</h3>
                        <p>「新規アセスメント作成」から始めてください</p>
                    </div>
                `;
                modal.classList.add('active');
                return;
            }

            let listHTML = '<h2>アセスメント一覧</h2><div class="list-container">';

            Object.entries(assessments)
                .sort((a, b) => new Date(b[1].createdAt) - new Date(a[1].createdAt))
                .forEach(([fileName, assessment]) => {
                    const childData = assessment.data;
                    const escapedFileName = fileName.replace(/'/g, "\\'");
                    listHTML += `
                        <div class="list-item" id="assessment-item-${fileName.replace(/[^a-zA-Z0-9]/g, '_')}">
                            <div class="list-item-info">
                                <h4>${childData.childName}（${childData.childNameKana || ''}）</h4>
                                <p>診断名: ${childData.diagnosis || 'なし'}</p>
                                <p>作成日: ${new Date(assessment.createdAt).toLocaleDateString('ja-JP')}</p>
                            </div>
                            <div class="list-item-actions">
                                <button class="btn btn-primary" onclick="viewAssessment('${escapedFileName}')">表示</button>
                                <button class="btn btn-danger-small" onclick="deleteAssessment('${escapedFileName}')" title="削除">🗑</button>
                            </div>
                        </div>
                    `;
                });

            listHTML += '</div>';
            content.innerHTML = listHTML;
            modal.classList.add('active');
        };

        // アセスメントを削除
        window.deleteAssessment = async function(fileName) {
            if (!confirm('このアセスメントを削除しますか？\n※関連する支援計画や活動記録は削除されません')) {
                return;
            }

            try {
                // localStorageから削除
                const assessments = JSON.parse(localStorage.getItem('assessments') || '{}');
                delete assessments[fileName];
                localStorage.setItem('assessments', JSON.stringify(assessments));

                // Google Driveからも削除を試みる
                if (typeof googleDriveAPI !== 'undefined' && googleDriveAPI.isInitialized()) {
                    try {
                        await googleDriveAPI.deleteFile(fileName);
                        // JSONファイルも削除
                        const jsonFileName = fileName.replace('.html', '.json');
                        await googleDriveAPI.deleteFile(jsonFileName);
                    } catch (e) {
                        console.log('Google Driveからの削除はスキップ:', e);
                    }
                }

                alert('削除しました');
                // 一覧を更新
                showAllAssessments();
            } catch (error) {
                console.error('削除エラー:', error);
                alert('削除に失敗しました');
            }
        };

        // 支援計画一覧を表示
        window.showAllSupportPlans = function() {
            const supportPlans = JSON.parse(localStorage.getItem('supportPlans') || '{}');
            const modal = document.getElementById('assessmentModal');
            const content = document.getElementById('assessmentContent');

            if (Object.keys(supportPlans).length === 0) {
                content.innerHTML = `
                    <h2>支援計画一覧</h2>
                    <div class="empty-state">
                        <h3>作成された支援計画はありません</h3>
                        <p>児童のアセスメントから「支援計画作成」をお試しください</p>
                    </div>
                `;
                modal.classList.add('active');
                return;
            }

            let listHTML = '<h2>支援計画一覧</h2><div class="list-container">';

            Object.entries(supportPlans)
                .sort((a, b) => new Date(b[1].createdAt) - new Date(a[1].createdAt))
                .forEach(([fileName, plan]) => {
                    const escapedFileName = fileName.replace(/'/g, "\\'");
                    listHTML += `
                        <div class="list-item">
                            <div class="list-item-info">
                                <h4>${plan.childName}</h4>
                                <p>ファイル名: ${fileName}</p>
                                <p>作成日: ${new Date(plan.createdAt).toLocaleDateString('ja-JP')}</p>
                            </div>
                            <div class="list-item-actions">
                                <button class="btn btn-secondary" onclick="viewSupportPlan('${escapedFileName}')">表示</button>
                                <button class="btn btn-danger-small" onclick="deleteSupportPlan('${escapedFileName}')" title="削除">🗑</button>
                            </div>
                        </div>
                    `;
                });

            listHTML += '</div>';
            content.innerHTML = listHTML;
            modal.classList.add('active');
        };

        // 支援計画を削除
        window.deleteSupportPlan = async function(fileName) {
            if (!confirm('この支援計画を削除しますか？')) {
                return;
            }

            try {
                const supportPlans = JSON.parse(localStorage.getItem('supportPlans') || '{}');
                delete supportPlans[fileName];
                localStorage.setItem('supportPlans', JSON.stringify(supportPlans));

                if (typeof googleDriveAPI !== 'undefined' && googleDriveAPI.isInitialized()) {
                    try {
                        await googleDriveAPI.deleteFile(fileName);
                        const jsonFileName = fileName.replace('.html', '.json');
                        await googleDriveAPI.deleteFile(jsonFileName);
                    } catch (e) {
                        console.log('Google Driveからの削除はスキップ:', e);
                    }
                }

                alert('削除しました');
                showAllSupportPlans();
            } catch (error) {
                console.error('削除エラー:', error);
                alert('削除に失敗しました');
            }
        };

        // 支援計画を表示
        window.viewSupportPlan = function(fileName) {
            const supportPlans = JSON.parse(localStorage.getItem('supportPlans') || '{}');
            const plan = supportPlans[fileName];
            if (plan) {
                const content = document.getElementById('assessmentContent');
                content.innerHTML = plan.html;
            }
        };

        // 成長記録一覧を表示
        window.showAllReports = function() {
            const dailyReports = JSON.parse(localStorage.getItem('dailyReports') || '{}');
            const reviews = JSON.parse(localStorage.getItem('reviews') || '{}');
            const modal = document.getElementById('assessmentModal');
            const content = document.getElementById('assessmentContent');

            const hasReports = Object.keys(dailyReports).length > 0;
            const hasReviews = Object.keys(reviews).length > 0;

            if (!hasReports && !hasReviews) {
                content.innerHTML = `
                    <h2>成長記録一覧</h2>
                    <div class="empty-state">
                        <h3>記録はまだありません</h3>
                        <p>児童のアセスメントから「日々の記録」または「成長振り返り」を作成してください</p>
                    </div>
                `;
                modal.classList.add('active');
                return;
            }

            let listHTML = '<h2>成長記録一覧</h2>';

            // 日々の記録
            if (hasReports) {
                listHTML += '<h3 style="margin: 20px 0 10px; color: #ff9800;">日々の記録</h3><div class="list-container">';
                Object.entries(dailyReports)
                    .sort((a, b) => new Date(b[1].createdAt) - new Date(a[1].createdAt))
                    .forEach(([fileName, report]) => {
                        const escapedFileName = fileName.replace(/'/g, "\\'");
                        listHTML += `
                            <div class="list-item">
                                <div class="list-item-info">
                                    <h4>${report.childName}</h4>
                                    <p>活動: ${report.activity || '（詳細は記録内）'}</p>
                                    <p>作成日: ${new Date(report.createdAt).toLocaleDateString('ja-JP')}</p>
                                </div>
                                <div class="list-item-actions">
                                    <button class="btn btn-tertiary" onclick="viewDailyReport('${escapedFileName}')">表示</button>
                                    <button class="btn btn-danger-small" onclick="deleteDailyReport('${escapedFileName}')" title="削除">🗑</button>
                                </div>
                            </div>
                        `;
                    });
                listHTML += '</div>';
            }

            // 成長振り返り
            if (hasReviews) {
                listHTML += '<h3 style="margin: 20px 0 10px; color: #2196f3;">成長振り返り</h3><div class="list-container">';
                Object.entries(reviews)
                    .sort((a, b) => new Date(b[1].createdAt) - new Date(a[1].createdAt))
                    .forEach(([fileName, review]) => {
                        const escapedFileName = fileName.replace(/'/g, "\\'");
                        listHTML += `
                            <div class="list-item">
                                <div class="list-item-info">
                                    <h4>${review.childName}</h4>
                                    <p>作成日: ${new Date(review.createdAt).toLocaleDateString('ja-JP')}</p>
                                </div>
                                <div class="list-item-actions">
                                    <button class="btn btn-quaternary" onclick="viewReview('${escapedFileName}')">表示</button>
                                    <button class="btn btn-danger-small" onclick="deleteReview('${escapedFileName}')" title="削除">🗑</button>
                                </div>
                            </div>
                        `;
                    });
                listHTML += '</div>';
            }

            content.innerHTML = listHTML;
            modal.classList.add('active');
        };

        // 日々の記録を表示
        window.viewDailyReport = function(fileName) {
            const dailyReports = JSON.parse(localStorage.getItem('dailyReports') || '{}');
            const report = dailyReports[fileName];
            if (report) {
                const content = document.getElementById('assessmentContent');
                content.innerHTML = report.html;
            }
        };

        // 日々の記録を削除
        window.deleteDailyReport = async function(fileName) {
            if (!confirm('この記録を削除しますか？')) {
                return;
            }

            try {
                const dailyReports = JSON.parse(localStorage.getItem('dailyReports') || '{}');
                delete dailyReports[fileName];
                localStorage.setItem('dailyReports', JSON.stringify(dailyReports));

                if (typeof googleDriveAPI !== 'undefined' && googleDriveAPI.isInitialized()) {
                    try {
                        await googleDriveAPI.deleteFile(fileName);
                        const jsonFileName = fileName.replace('.html', '.json');
                        await googleDriveAPI.deleteFile(jsonFileName);
                    } catch (e) {
                        console.log('Google Driveからの削除はスキップ:', e);
                    }
                }

                alert('削除しました');
                showAllReports();
            } catch (error) {
                console.error('削除エラー:', error);
                alert('削除に失敗しました');
            }
        };

        // 成長振り返りを表示
        window.viewReview = function(fileName) {
            const reviews = JSON.parse(localStorage.getItem('reviews') || '{}');
            const review = reviews[fileName];
            if (review) {
                const content = document.getElementById('assessmentContent');
                content.innerHTML = review.html;
            }
        };

        // 成長振り返りを削除
        window.deleteReview = async function(fileName) {
            if (!confirm('この成長振り返りを削除しますか？')) {
                return;
            }

            try {
                const reviews = JSON.parse(localStorage.getItem('reviews') || '{}');
                delete reviews[fileName];
                localStorage.setItem('reviews', JSON.stringify(reviews));

                if (typeof googleDriveAPI !== 'undefined' && googleDriveAPI.isInitialized()) {
                    try {
                        await googleDriveAPI.deleteFile(fileName);
                        const jsonFileName = fileName.replace('.html', '.json');
                        await googleDriveAPI.deleteFile(jsonFileName);
                    } catch (e) {
                        console.log('Google Driveからの削除はスキップ:', e);
                    }
                }

                alert('削除しました');
                showAllReports();
            } catch (error) {
                console.error('削除エラー:', error);
                alert('削除に失敗しました');
            }
        };

        // Initialize
        loadChildren();
    </script>
</body>
</html>
