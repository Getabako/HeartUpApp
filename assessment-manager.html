<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カラーズFC アセスメント管理システム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Yu Gothic', 'Meiryo', sans-serif;
            background: linear-gradient(135deg, #2e7d32 0%, #4caf50 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .main-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .action-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .action-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.2);
        }

        .action-card h3 {
            color: #2e7d32;
            margin-bottom: 10px;
            font-size: 20px;
        }

        .action-card p {
            color: #666;
            font-size: 14px;
        }

        .children-list {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 30px;
            margin-bottom: 20px;
        }

        .children-list h2 {
            color: #2e7d32;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .filter-section {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-section input,
        .filter-section select {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .filter-section input:focus,
        .filter-section select:focus {
            border-color: #4caf50;
        }

        .filter-section input {
            flex: 1;
            min-width: 200px;
        }

        .children-count {
            color: #666;
            font-size: 14px;
            margin-left: auto;
        }

        .grade-badge {
            display: inline-block;
            background: #e8f5e9;
            color: #2e7d32;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 8px;
        }

        .child-records-summary {
            display: flex;
            gap: 8px;
            margin-top: 6px;
            flex-wrap: wrap;
        }

        .record-count-badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            color: white;
        }

        .record-count-badge.assessment { background: #4caf50; }
        .record-count-badge.plan { background: #66bb6a; }
        .record-count-badge.daily { background: #ff9800; }
        .record-count-badge.review { background: #2196f3; }

        .child-item {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 20px;
            align-items: center;
            transition: border-color 0.3s;
        }

        .child-item:hover {
            border-color: #4caf50;
        }

        .child-info h3 {
            color: #333;
            margin-bottom: 8px;
        }

        .child-info p {
            color: #666;
            font-size: 14px;
            margin: 4px 0;
        }

        .child-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: opacity 0.3s;
        }

        .btn:hover {
            opacity: 0.8;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4caf50 0%, #66bb6a 100%);
            color: white;
        }

        .btn-secondary {
            background: #4caf50;
            color: white;
        }

        .btn-tertiary {
            background: #ff9800;
            color: white;
        }

        .btn-quaternary {
            background: #2196f3;
            color: white;
        }

        .btn-danger-small {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ef9a9a;
            padding: 0.4rem 0.6rem;
            font-size: 0.9rem;
            min-width: auto;
        }

        .btn-danger-small:hover {
            background: #ffcdd2;
            opacity: 1;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 12px;
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
            width: 90%;
        }

        .modal-content h2 {
            color: #2e7d32;
            margin-bottom: 20px;
        }

        .close-modal {
            float: right;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }

        .close-modal:hover {
            color: #333;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 10px;
        }

        /* 一覧表示スタイル */
        .list-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .list-item:hover {
            background: #e8f5e9;
            border-color: #4caf50;
        }

        .list-item-info h4 {
            color: #333;
            margin-bottom: 5px;
        }

        .list-item-info p {
            color: #666;
            font-size: 13px;
            margin: 2px 0;
        }

        .list-item-actions {
            display: flex;
            gap: 10px;
        }

        @media print {
            body {
                background: white;
                padding: 0;
                min-height: auto;
            }

            .container > header,
            .main-actions,
            .children-list,
            .close-modal {
                display: none !important;
            }

            .modal {
                display: block !important;
                position: static;
                background: none;
                width: 100%;
                height: auto;
            }

            .modal-content {
                max-width: 100%;
                max-height: none;
                overflow: visible;
                width: 100%;
                padding: 0;
                border-radius: 0;
                box-shadow: none;
            }
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 28px;
            }

            .child-item {
                grid-template-columns: 1fr;
            }

            .child-actions {
                justify-content: flex-start;
            }

            .list-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .list-item-actions {
                width: 100%;
            }

            .filter-section {
                flex-direction: column;
            }

            .filter-section input {
                min-width: auto;
                width: 100%;
            }

            .children-count {
                margin-left: 0;
                display: block;
                margin-top: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>カラーズFC アセスメント管理システム</h1>
            <p>お子様の特性管理・支援計画・日々の記録を一元管理</p>
        </header>

        <!-- 拠点情報 + データ移行バー -->
        <div id="locationBar" style="text-align:center; margin-bottom:20px; padding:12px; background:rgba(255,255,255,0.95); border-radius:12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
            <p id="locationInfo" style="color:#2e7d32; font-size:0.9rem; font-weight:bold;"></p>
            <div id="migrationBar" style="display:none; margin-top:10px; padding:10px; background:#fff3e0; border-radius:8px;">
                <p style="color:#e65100; font-size:0.85rem; margin-bottom:8px;">ローカルにデータが見つかりました。クラウドに移行できます。</p>
                <button id="migrateBtn" onclick="migrateLocalData()" style="
                    padding:8px 20px; border:none; border-radius:8px;
                    background:#ff9800; color:white; font-size:0.9rem;
                    font-weight:bold; cursor:pointer;
                ">ローカルデータをインポート</button>
                <div id="migrationStatus" style="margin-top:8px; font-size:0.85rem; color:#666;"></div>
            </div>
        </div>

        <div class="main-actions">
            <div class="action-card" onclick="window.location.href='assessment/form-simple.html'">
                <h3>新規アセスメント作成</h3>
                <p>新しいお子様のアセスメントシートを作成します</p>
            </div>
            <div class="action-card" onclick="showAllAssessments()">
                <h3>アセスメント一覧</h3>
                <p>登録済みのアセスメントシートを確認します</p>
            </div>
            <div class="action-card" onclick="showAllSupportPlans()">
                <h3>支援計画一覧</h3>
                <p>作成済みの支援計画を確認します</p>
            </div>
            <div class="action-card" onclick="showAllReports()">
                <h3>成長記録一覧</h3>
                <p>日々の記録と成長の振り返りを確認します</p>
            </div>
        </div>

        <div class="children-list">
            <h2>登録児童一覧 <span id="childrenCount" class="children-count"></span></h2>
            <div class="filter-section">
                <input type="text" id="nameSearch" placeholder="名前で検索..." oninput="filterChildren()">
                <select id="gradeFilter" onchange="filterChildren()">
                    <option value="">全学年</option>
                </select>
            </div>
            <div id="childrenContainer">
                <div class="empty-state">
                    <h3>読み込み中...</h3>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for viewing assessment -->
    <div id="assessmentModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('assessmentModal')">&times;</span>
            <div id="assessmentContent"></div>
        </div>
    </div>

    <!-- html2pdf.js for PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <!-- config.jsは存在する場合のみ読み込む（デプロイ時に自動生成される） -->
    <script>
        // 最初に空のAPI_CONFIGを定義（デフォルト値）
        window.API_CONFIG = {
            GEMINI_API_KEY: '',
            MODEL_NAME: 'gemini-2.0-flash-exp'
        };
        window.FIREBASE_CONFIG = { apiKey: '', authDomain: '', projectId: '' };
    </script>
    <script src="config.js?v=20260317" onerror="console.log('config.js not found - using default API_CONFIG')"></script>
    <script src="firebase-client.js?v=20260318"></script>
    <script src="data-adapter.js?v=20260317"></script>
    <script src="auth-guard.js?v=20260317"></script>
    <script src="gemini-api.js?v=20260317"></script>
    <script>
        // グローバルデータキャッシュ
        let allChildrenData = [];
        let cachedAssessments = {};
        let cachedSupportPlans = {};
        let cachedDailyReports = {};
        let cachedReviews = {};

        // 初期化
        document.addEventListener('DOMContentLoaded', async function() {
            heartUpDB.init();
            await authGuard.init();

            try {
                geminiAPI.loadApiKey();
            } catch (e) {
                console.error('Gemini API初期化エラー:', e);
            }

            // 拠点情報を表示
            const locationInfo = document.getElementById('locationInfo');
            if (heartUpDB.isReady() && heartUpDB.currentProfile) {
                locationInfo.textContent = heartUpDB.getMyLocationName() + ' - データはクラウドに保存されています';
            } else {
                locationInfo.textContent = 'データは端末内に保存されています';
            }

            // ローカルデータ移行ツールの表示判定
            if (heartUpDB.isReady()) {
                const localAssessments = JSON.parse(localStorage.getItem('assessments') || '{}');
                const localPlans = JSON.parse(localStorage.getItem('supportPlans') || '{}');
                const localReports = JSON.parse(localStorage.getItem('dailyReports') || '{}');
                const localReviews = JSON.parse(localStorage.getItem('reviews') || '{}');
                const localChildren = JSON.parse(localStorage.getItem('children') || '{}');
                const total = Object.keys(localAssessments).length + Object.keys(localPlans).length +
                              Object.keys(localReports).length + Object.keys(localReviews).length +
                              Object.keys(localChildren).length;
                if (total > 0) {
                    document.getElementById('migrationBar').style.display = 'block';
                    document.querySelector('#migrationBar p').textContent =
                        `ローカルにデータが見つかりました（児童${Object.keys(localChildren).length}名、アセスメント${Object.keys(localAssessments).length}件、計画${Object.keys(localPlans).length}件、記録${Object.keys(localReports).length}件、振り返り${Object.keys(localReviews).length}件）。クラウドに移行できます。`;
                }
            }

            try {
                await loadChildren();
            } catch (e) {
                console.error('loadChildrenエラー:', e);
            }
        });

        /**
         * ローカルデータをクラウドに移行
         */
        async function migrateLocalData() {
            if (!heartUpDB.isReady()) {
                alert('クラウドに接続されていません');
                return;
            }
            if (!confirm('ローカルデータをクラウドに移行しますか？')) return;

            const btn = document.getElementById('migrateBtn');
            const statusEl = document.getElementById('migrationStatus');
            btn.disabled = true;
            btn.textContent = '移行中...';

            try {
                const locationId = heartUpDB.getMyLocationId();
                const results = await heartUpDB.migrateFromLocalStorage(locationId);

                statusEl.style.color = '#2e7d32';
                statusEl.textContent = `移行完了: 児童${results.children}名、アセスメント${results.assessments}件、計画${results.supportPlans}件、記録${results.dailyReports}件、振り返り${results.reviews}件`;

                if (confirm('移行完了しました。ローカルデータを削除しますか？（推奨）')) {
                    localStorage.removeItem('assessments');
                    localStorage.removeItem('supportPlans');
                    localStorage.removeItem('dailyReports');
                    localStorage.removeItem('reviews');
                    localStorage.removeItem('children');
                    document.getElementById('migrationBar').style.display = 'none';
                }

                await loadChildren();
            } catch (error) {
                console.error('移行エラー:', error);
                statusEl.style.color = '#e53935';
                statusEl.textContent = '移行エラー: ' + error.message;
            } finally {
                btn.disabled = false;
                btn.textContent = 'ローカルデータをインポート';
            }
        }

        // 学年計算（日本の学年制度: 4月2日〜翌4月1日が同学年）
        function calculateGrade(birthDateStr) {
            if (!birthDateStr) return '';
            const birth = new Date(birthDateStr);
            if (isNaN(birth.getTime())) return '';
            const now = new Date();
            const fiscalYear = now.getMonth() >= 3 ? now.getFullYear() : now.getFullYear() - 1;
            let cohortStartYear;
            if (birth.getMonth() > 3 || (birth.getMonth() === 3 && birth.getDate() >= 2)) {
                cohortStartYear = birth.getFullYear();
            } else {
                cohortStartYear = birth.getFullYear() - 1;
            }
            const gradeAge = fiscalYear - cohortStartYear;
            const labels = { 0:'0歳児', 1:'1歳児', 2:'2歳児', 3:'年少', 4:'年中', 5:'年長',
                6:'小1', 7:'小2', 8:'小3', 9:'小4', 10:'小5', 11:'小6',
                12:'中1', 13:'中2', 14:'中3', 15:'高1', 16:'高2', 17:'高3' };
            return labels[gradeAge] || `${gradeAge}歳`;
        }

        // 全データを読み込んで児童一覧を表示
        async function loadChildren() {
            try {
                const [children, assessments, supportPlans, dailyReports, reviews] = await Promise.all([
                    dataAdapter.getChildren(),
                    dataAdapter.getAssessments(),
                    dataAdapter.getSupportPlans(),
                    dataAdapter.getDailyReports(),
                    dataAdapter.getReviews()
                ]);

                cachedAssessments = assessments;
                cachedSupportPlans = supportPlans;
                cachedDailyReports = dailyReports;
                cachedReviews = reviews;

                const container = document.getElementById('childrenContainer');
                if (!container) return;

                // アセスメントを児童名でグループ化
                const assessmentsByChild = {};
                Object.entries(assessments).forEach(([fileName, a]) => {
                    const name = a.data?.childName || '';
                    if (!name) return;
                    if (!assessmentsByChild[name]) assessmentsByChild[name] = [];
                    assessmentsByChild[name].push({ fileName, ...a });
                });

                // 支援計画を児童名でグループ化
                const plansByChild = {};
                Object.entries(supportPlans).forEach(([fileName, p]) => {
                    const name = p.childName || '';
                    if (!name) return;
                    if (!plansByChild[name]) plansByChild[name] = [];
                    plansByChild[name].push({ fileName, ...p });
                });

                // 日々の記録を児童名でグループ化
                const reportsByChild = {};
                Object.entries(dailyReports).forEach(([fileName, r]) => {
                    const name = r.childName || '';
                    if (!name) return;
                    if (!reportsByChild[name]) reportsByChild[name] = [];
                    reportsByChild[name].push({ fileName, ...r });
                });

                // 振り返りを児童名でグループ化
                const reviewsByChild = {};
                Object.entries(reviews).forEach(([fileName, r]) => {
                    const name = r.childName || '';
                    if (!name) return;
                    if (!reviewsByChild[name]) reviewsByChild[name] = [];
                    reviewsByChild[name].push({ fileName, ...r });
                });

                // 児童データを統合
                allChildrenData = [];
                const processedNames = new Set();

                // childrenコレクションから
                Object.entries(children).forEach(([name, child]) => {
                    const childAssessments = assessmentsByChild[name] || [];
                    const latest = childAssessments.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt))[0];
                    const formData = latest?.data || {};
                    const birthDate = formData.birthDate || child.birthDate || '';

                    allChildrenData.push({
                        name,
                        childId: child.id,
                        birthDate,
                        gender: formData.gender || child.gender || '',
                        diagnosis: formData.diagnosis || child.diagnosis || '',
                        childNameKana: formData.childNameKana || child.childNameKana || '',
                        createdAt: child.createdAt,
                        assessmentCount: childAssessments.length,
                        planCount: (plansByChild[name] || []).length,
                        reportCount: (reportsByChild[name] || []).length,
                        reviewCount: (reviewsByChild[name] || []).length,
                        latestAssessmentFileName: latest?.fileName || null,
                        grade: calculateGrade(birthDate)
                    });
                    processedNames.add(name);
                });

                // assessmentsにしかいない児童も追加
                Object.entries(assessmentsByChild).forEach(([name, childAssessments]) => {
                    if (processedNames.has(name)) return;
                    const latest = childAssessments.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt))[0];
                    const formData = latest?.data || {};
                    const birthDate = formData.birthDate || '';

                    allChildrenData.push({
                        name,
                        childId: null,
                        birthDate,
                        gender: formData.gender || '',
                        diagnosis: formData.diagnosis || '',
                        childNameKana: formData.childNameKana || '',
                        createdAt: latest?.createdAt,
                        assessmentCount: childAssessments.length,
                        planCount: (plansByChild[name] || []).length,
                        reportCount: (reportsByChild[name] || []).length,
                        reviewCount: (reviewsByChild[name] || []).length,
                        latestAssessmentFileName: latest?.fileName || null,
                        grade: calculateGrade(birthDate)
                    });
                });

                updateGradeFilter();
                renderChildren(allChildrenData);
            } catch (error) {
                console.error('loadChildren エラー:', error);
            }
        }

        // 学年フィルタの選択肢を更新
        function updateGradeFilter() {
            const gradeSelect = document.getElementById('gradeFilter');
            if (!gradeSelect) return;
            const gradeOrder = ['0歳児','1歳児','2歳児','年少','年中','年長','小1','小2','小3','小4','小5','小6','中1','中2','中3','高1','高2','高3'];
            const grades = [...new Set(allChildrenData.map(c => c.grade).filter(Boolean))];
            grades.sort((a, b) => gradeOrder.indexOf(a) - gradeOrder.indexOf(b));
            gradeSelect.innerHTML = '<option value="">全学年</option>';
            grades.forEach(g => { gradeSelect.innerHTML += `<option value="${g}">${g}</option>`; });
        }

        // フィルタリング
        function filterChildren() {
            const nameQuery = (document.getElementById('nameSearch')?.value || '').toLowerCase();
            const gradeQuery = document.getElementById('gradeFilter')?.value || '';
            const filtered = allChildrenData.filter(child => {
                const nameMatch = !nameQuery ||
                    child.name.toLowerCase().includes(nameQuery) ||
                    (child.childNameKana || '').toLowerCase().includes(nameQuery);
                const gradeMatch = !gradeQuery || child.grade === gradeQuery;
                return nameMatch && gradeMatch;
            });
            renderChildren(filtered);
        }

        // 児童一覧を描画
        function renderChildren(childrenList) {
            const container = document.getElementById('childrenContainer');
            if (!container) return;

            const countEl = document.getElementById('childrenCount');
            if (countEl) countEl.textContent = `（${childrenList.length}名）`;

            if (childrenList.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>該当する児童がいません</h3>
                        <p>検索条件を変更するか、「新規アセスメント作成」から登録してください</p>
                    </div>`;
                return;
            }

            container.innerHTML = '';
            childrenList.forEach(child => {
                const childItem = document.createElement('div');
                childItem.className = 'child-item';
                const escapedName = child.name.replace(/'/g, "\\'");

        window.createDailyReport = async function(fileName) {
            const assessment = await dataAdapter.getAssessmentWithHtml(fileName);
            if (!assessment) {
                alert('アセスメントデータが見つかりません');
                return;
            }
            if (!assessment.data && assessment.form_data) assessment.data = assessment.form_data;

            const activity = prompt(`${assessment.data.childName}さんの本日の活動内容を入力してください:`);
            if (!activity) return;

            const observation = prompt('本日の様子や気づいたことを入力してください:');
            if (!observation) return;

            try {
                // Get latest support plan
                const supportPlans = await dataAdapter.getSupportPlans();
                const childPlans = Object.entries(supportPlans)
                    .filter(([key, plan]) => plan.childName === assessment.data.childName)
                    .sort((a, b) => new Date(b[1].createdAt) - new Date(a[1].createdAt));

                const latestPlan = childPlans[0]?.[1];

                const prompt = `
児童発達支援の日々の指導記録を作成してください。

児童名: ${assessment.data.childName}
日付: ${new Date().toLocaleDateString('ja-JP')}

【本日の活動】
${activity}

【観察内容】
${observation}

【参考情報】
アセスメント情報:
- 診断名: ${assessment.data.diagnosis || 'なし'}
- 主な特性: ${assessment.data.situationEpisode}, ${assessment.data.communicationDetails}

${latestPlan ? `支援計画目標: ${latestPlan.html}` : ''}

【記録に含める内容】
1. 活動内容
2. 児童の反応と様子
3. 支援計画との関連
4. 成長が見られた点
5. 今後の支援で注意すべき点

HTMLフォーマットで、見やすく整理された日々の記録を作成してください。
`;

                const reportHTML = await geminiAPI.generateContent(prompt);

                // Save daily report
                const reportFileName = `${assessment.data.childName}_記録_${new Date().toISOString().split('T')[0]}.html`;
                const today = new Date().toISOString().split('T')[0];
                await dataAdapter.saveDailyReport(reportFileName, reportHTML, assessment.data.childName, today, {
                    activity: activity,
                    observation: observation
                });

                alert('日々の記録が作成されました！');

                // Display the report
                const modal = document.getElementById('assessmentModal');
                const content = document.getElementById('assessmentContent');
                content.innerHTML = reportHTML;
                modal.classList.add('active');
            } catch (error) {
                console.error('Error creating daily report:', error);
                alert('日々の記録の作成に失敗しました。もう一度お試しください。');
            }
        };

        window.createReview = async function(fileName) {
            const assessment = await dataAdapter.getAssessmentWithHtml(fileName);
            if (!assessment) {
                alert('アセスメントデータが見つかりません');
                return;
            }
            if (!assessment.data && assessment.form_data) assessment.data = assessment.form_data;

            const confirmMsg = `${assessment.data.childName}さんの成長の振り返りを作成します。よろしいですか？`;
            if (!confirm(confirmMsg)) return;

            try {
                // Get all related data
                const supportPlans = await dataAdapter.getSupportPlans();
                const dailyReports = await dataAdapter.getDailyReports();
                const reviews = await dataAdapter.getReviews();

                const childPlans = Object.entries(supportPlans)
                    .filter(([key, plan]) => plan.childName === assessment.data.childName);

                const childReports = Object.entries(dailyReports)
                    .filter(([key, report]) => report.childName === assessment.data.childName)
                    .sort((a, b) => new Date(b[1].createdAt) - new Date(a[1].createdAt))
                    .slice(0, 10); // Last 10 reports

                const previousReviews = Object.entries(reviews)
                    .filter(([key, review]) => review.childName === assessment.data.childName)
                    .sort((a, b) => new Date(b[1].createdAt) - new Date(a[1].createdAt));

                const prompt = `
児童発達支援の成長の振り返りレポートを作成してください。

児童名: ${assessment.data.childName}
作成日: ${new Date().toLocaleDateString('ja-JP')}

【アセスメント情報】
診断名: ${assessment.data.diagnosis || 'なし'}
主な特性:
- ${assessment.data.situationEpisode}
- ${assessment.data.communicationDetails}

【支援計画】
${childPlans.map(([key, plan]) => plan.html).join('\n')}

【最近の活動記録（直近10件）】
${childReports.map(([key, report]) => `
日付: ${new Date(report.createdAt).toLocaleDateString('ja-JP')}
活動: ${report.activity}
観察: ${report.observation}
`).join('\n')}

${previousReviews.length > 0 ? `
【過去の振り返り】
${previousReviews[0][1].html}
` : ''}

【振り返りレポートに含める内容】
1. この期間の全体的な成長の様子
2. 支援計画の達成状況
3. 特に成長が見られた領域
4. まだ支援が必要な領域
5. 今後の支援の方向性
6. 保護者へのフィードバック

HTMLフォーマットで、グラフや表を使用して視覚的に分かりやすい振り返りレポートを作成してください。
`;

                const reviewHTML = await geminiAPI.generateContent(prompt);

                // Save review
                const reviewFileName = `${assessment.data.childName}_振り返り_${new Date().toISOString().split('T')[0]}.html`;
                await dataAdapter.saveReview(reviewFileName, reviewHTML, assessment.data.childName, {});

                alert('成長の振り返りが作成されました！');

                // Display the review
                const modal = document.getElementById('assessmentModal');
                const content = document.getElementById('assessmentContent');
                content.innerHTML = reviewHTML;
                modal.classList.add('active');
            } catch (error) {
                console.error('Error creating review:', error);
                alert('成長の振り返りの作成に失敗しました。もう一度お試しください。');
            }
        };
