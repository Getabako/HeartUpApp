<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeartUp - ログイン</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2e7d32 0%, #4caf50 100%);
        }
        .login-card {
            background: white;
            padding: 48px 40px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 420px;
            width: 90%;
        }
        .login-card img { width: 80px; height: 80px; margin-bottom: 16px; }
        .login-card h1 { color: #2e7d32; font-size: 28px; margin-bottom: 8px; }
        .login-card .subtitle { color: #666; font-size: 14px; margin-bottom: 32px; }
        .google-btn {
            display: inline-flex; align-items: center; gap: 12px;
            padding: 14px 32px; background: white; border: 2px solid #dadce0;
            border-radius: 8px; cursor: pointer; font-size: 16px; color: #3c4043;
            transition: background 0.2s, box-shadow 0.2s;
        }
        .google-btn:hover { background: #f7f8f8; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .google-btn svg { width: 20px; height: 20px; }
        .error-msg { color: #d32f2f; margin-top: 16px; font-size: 14px; display: none; }
        .loading { display: none; margin-top: 16px; color: #666; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="soccerball.png" alt="HeartUp">
        <h1>HeartUp</h1>
        <p class="subtitle">サッカー療育支援システム</p>

        <button class="google-btn" onclick="handleLogin()">
            <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Googleでログイン
        </button>

        <p class="error-msg" id="errorMsg"></p>
        <p class="loading" id="loading">ログイン中...</p>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script>
        window.FIREBASE_CONFIG = { apiKey: '', authDomain: '', projectId: '' };
    </script>
    <script src="config.js" onerror="console.log('config.js not found')"></script>
    <script src="firebase-client.js"></script>
    <script>
        heartUpDB.init();

        // 既にログイン済みならリダイレクト
        if (heartUpDB.isReady()) {
            heartUpDB.auth.onAuthStateChanged(user => {
                if (user) window.location.href = '/index.html';
            });
        }

        async function handleLogin() {
            const errorEl = document.getElementById('errorMsg');
            const loadingEl = document.getElementById('loading');
            errorEl.style.display = 'none';
            loadingEl.style.display = 'block';

            try {
                if (!heartUpDB.isReady()) {
                    throw new Error('Firebaseが設定されていません。管理者に連絡してください。');
                }
                await heartUpDB.signInWithGoogle();
                // ポップアップ成功後、自動的にonAuthStateChangedでリダイレクト
            } catch (e) {
                loadingEl.style.display = 'none';
                if (e.code === 'auth/popup-closed-by-user') return;
                errorEl.textContent = e.message;
                errorEl.style.display = 'block';
            }
        }
    </script>
</body>
</html>
