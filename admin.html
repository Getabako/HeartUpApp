<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeartUp - 管理画面</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Yu Gothic', 'Meiryo', sans-serif;
            background: linear-gradient(135deg, #2e7d32 0%, #4caf50 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; color: white; margin-bottom: 30px; }
        header h1 { font-size: 32px; margin-bottom: 8px; }
        header p { font-size: 14px; opacity: 0.9; }
        .header-right { position: absolute; top: 0; right: 0; display: flex; gap: 8px; align-items: center; }
        .back-link { color: white; text-decoration: none; padding: 8px 16px; border: 1px solid rgba(255,255,255,0.5); border-radius: 8px; font-size: 14px; }
        .back-link:hover { background: rgba(255,255,255,0.1); }

        .section { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 24px; margin-bottom: 24px; }
        .section h2 { color: #2e7d32; margin-bottom: 16px; font-size: 20px; }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f5f5f5; color: #555; font-size: 13px; }
        td { font-size: 14px; }

        .badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .badge-admin { background: #e8f5e9; color: #2e7d32; }
        .badge-staff { background: #e3f2fd; color: #1565c0; }

        .btn { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.85; }
        .btn-primary { background: #2e7d32; color: white; }
        .btn-danger { background: #d32f2f; color: white; }
        .btn-sm { padding: 6px 12px; font-size: 12px; }

        .actions { display: flex; gap: 8px; justify-content: flex-end; margin-bottom: 16px; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: white; border-radius: 12px; padding: 32px; max-width: 480px; width: 90%; }
        .modal h3 { color: #2e7d32; margin-bottom: 20px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

        .empty-msg { color: #999; text-align: center; padding: 20px; }
    </style>
</head>
<body data-admin-only="true">
    <div class="container">
        <header style="position:relative;">
            <h1>HeartUp 管理画面</h1>
            <p>拠点・スタッフ管理</p>
            <div class="header-right">
                <a href="/index.html" class="back-link">トップに戻る</a>
            </div>
        </header>

        <!-- 拠点管理 -->
        <div class="section">
            <h2>拠点管理</h2>
            <div class="actions">
                <button class="btn btn-primary" onclick="showAddLocationModal()">+ 拠点を追加</button>
            </div>
            <table>
                <thead><tr><th>拠点名</th><th>作成日</th><th></th></tr></thead>
                <tbody id="locationsBody"><tr><td colspan="3" class="empty-msg">読み込み中...</td></tr></tbody>
            </table>
        </div>

        <!-- スタッフ管理 -->
        <div class="section">
            <h2>スタッフ一覧</h2>
            <table>
                <thead><tr><th>名前</th><th>メール</th><th>ロール</th><th>拠点</th><th>拠点変更</th><th>操作</th></tr></thead>
                <tbody id="staffBody"><tr><td colspan="6" class="empty-msg">読み込み中...</td></tr></tbody>
            </table>
        </div>

        <!-- 招待管理 -->
        <div class="section">
            <h2>スタッフ招待</h2>
            <div class="actions">
                <button class="btn btn-primary" onclick="showInviteModal()">+ スタッフを招待</button>
            </div>
            <table>
                <thead><tr><th>名前</th><th>メール</th><th>ロール</th><th>拠点</th><th></th></tr></thead>
                <tbody id="invitationsBody"><tr><td colspan="5" class="empty-msg">読み込み中...</td></tr></tbody>
            </table>
        </div>

        <!-- テストデータ管理 -->
        <div class="section">
            <h2>テストデータ管理</h2>
            <div class="actions">
                <button class="btn btn-danger" onclick="cleanupTestData()">テストデータを整理</button>
            </div>
            <div style="margin-top: 16px;">
                <p style="color: #666; font-size: 14px; margin-bottom: 12px;">
                    テスト用に登録した架空の生徒データ（「デップ星人」など）を削除します。<br>
                    <strong style="color: #d32f2f;">※この操作は取り消せません。本番データには影響しません。</strong>
                </p>
                <div id="testDataStatus" style="padding: 12px; background: #f5f5f5; border-radius: 6px; font-size: 13px;">
                    準備中...
                </div>
            </div>
        </div>
    </div>

    <!-- 拠点追加モーダル -->
    <div class="modal-overlay" id="addLocationModal">
        <div class="modal">
            <h3>拠点を追加</h3>
            <div class="form-group">
                <label>拠点名</label>
                <input type="text" id="locationName" placeholder="例: カラーズFC鳥栖">
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="closeModal('addLocationModal')">キャンセル</button>
                <button class="btn btn-primary" onclick="addLocation()">追加</button>
            </div>
        </div>
    </div>

    <!-- 招待モーダル -->
    <div class="modal-overlay" id="inviteModal">
        <div class="modal">
            <h3>スタッフを招待</h3>
            <div class="form-group">
                <label>メールアドレス</label>
                <input type="email" id="inviteEmail" placeholder="staff@example.com">
            </div>
            <div class="form-group">
                <label>名前</label>
                <input type="text" id="inviteName" placeholder="山田 太郎">
            </div>
            <div class="form-group">
                <label>ロール</label>
                <select id="inviteRole">
                    <option value="staff">スタッフ</option>
                    <option value="admin">管理者</option>
                </select>
            </div>
            <div class="form-group">
                <label>拠点</label>
                <select id="inviteLocation"></select>
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="closeModal('inviteModal')">キャンセル</button>
                <button class="btn btn-primary" onclick="inviteStaff()">招待</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script>
        window.FIREBASE_CONFIG = { apiKey: '', authDomain: '', projectId: '' };
    </script>
    <script src="config.js?v=20260706" onerror="console.log('config.js not found')"></script>
    <script src="firebase-client.js?v=20260706"></script>
    <script src="data-adapter.js?v=20260706"></script>
    <script src="auth-guard.js?v=20260706"></script>
    <script>
        let locations = [];

        async function initAdmin() {
            heartUpDB.init();
            await authGuard.init();
            if (!heartUpDB.isReady() || !heartUpDB.isAdmin()) return;
            await loadAll();
        }

        async function loadAll() {
            await Promise.all([loadLocations(), loadStaff(), loadInvitations()]);
        }

        // ---- 拠点 ----

        async function loadLocations() {
            try {
                locations = await heartUpDB.getLocations();
                const tbody = document.getElementById('locationsBody');
                if (locations.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" class="empty-msg">拠点がありません</td></tr>';
                    return;
                }
                // 同名拠点を検出して重複バッジを表示
                const nameCount = {};
                locations.forEach(l => { nameCount[l.name] = (nameCount[l.name] || 0) + 1; });
                tbody.innerHTML = locations.map(l => {
                    const isDup = nameCount[l.name] > 1;
                    const dupBadge = isDup ? '<span style="display:inline-block;background:#ffebee;color:#c62828;padding:2px 6px;border-radius:4px;font-size:11px;margin-left:6px;">重複</span>' : '';
                    const mergeBtn = isDup ? `<button class="btn btn-sm" style="background:#ff9800;color:white;margin-right:4px;" onclick="showMergeLocation('${l.id}','${(l.name || '').replace(/'/g, "\\'")}')">統合</button>` : '';
                    return `
                    <tr${isDup ? ' style="background:#fff8f8;"' : ''}>
                        <td>${l.name}${dupBadge}<br><span style="color:#999;font-size:11px;">ID: ${l.id}</span></td>
                        <td>${new Date(l.created_at).toLocaleDateString('ja-JP')}</td>
                        <td>
                            ${mergeBtn}
                            <button class="btn btn-danger btn-sm" onclick="deleteLocation('${l.id}','${(l.name || '').replace(/'/g, "\\'")}')">削除</button>
                        </td>
                    </tr>
                    `;
                }).join('');
            } catch (e) {
                console.error('拠点読み込みエラー:', e);
            }
        }

        function showAddLocationModal() {
            document.getElementById('locationName').value = '';
            document.getElementById('addLocationModal').classList.add('active');
        }

        async function addLocation() {
            const name = document.getElementById('locationName').value.trim();
            if (!name) return alert('拠点名を入力してください');
            try {
                await heartUpDB.createLocation(name);
                closeModal('addLocationModal');
                await loadAll();
            } catch (e) {
                alert('エラー: ' + e.message);
            }
        }

        async function deleteLocation(id, name) {
            // 紐づくデータがある場合は削除を拒否
            try {
                const counts = await heartUpDB.countLocationUsage(id);
                const total = Object.values(counts).reduce((a, b) => a + b, 0);
                if (total > 0) {
                    const detail = Object.entries(counts).filter(([, v]) => v > 0).map(([k, v]) => `${k}: ${v}件`).join(' / ');
                    alert(`「${name}」には以下のデータが紐づいているため削除できません。\n\n${detail}\n\n「統合」機能で別の拠点にデータを移してから削除してください。`);
                    return;
                }
            } catch (e) {
                alert('利用状況の確認に失敗しました: ' + e.message);
                return;
            }
            if (!confirm(`「${name}」を削除しますか？\nこの拠点には紐づくデータがありません。`)) return;
            try {
                await heartUpDB.deleteLocation(id);
                await loadAll();
            } catch (e) {
                alert('削除エラー: ' + e.message);
            }
        }

        // ---- 拠点統合（マージ） ----
        async function showMergeLocation(fromId, fromName) {
            // 同名 or 任意の他拠点を統合先候補にする
            const candidates = locations.filter(l => l.id !== fromId);
            if (candidates.length === 0) {
                alert('統合先の拠点がありません。');
                return;
            }
            // 利用状況を取得
            let counts;
            try {
                counts = await heartUpDB.countLocationUsage(fromId);
            } catch (e) {
                alert('利用状況の取得に失敗: ' + e.message);
                return;
            }
            const detail = Object.entries(counts).map(([k, v]) => `${k}: ${v}件`).join(' / ');

            // 同名拠点を最優先候補に
            const sameName = candidates.filter(l => l.name === fromName);
            const others = candidates.filter(l => l.name !== fromName);
            const sorted = [...sameName, ...others];

            const optionsHtml = sorted.map(l =>
                `<option value="${l.id}">${l.name}${l.name === fromName ? '（同名）' : ''} - ID:${l.id.substring(0,8)}…</option>`
            ).join('');

            // 簡易モーダル（既存スタイル流用）
            const html = `
                <div class="modal-overlay active" id="mergeLocationModal" style="display:flex;">
                    <div class="modal">
                        <h3>拠点を統合</h3>
                        <p style="margin-bottom:12px;"><strong>統合元（消える側）:</strong><br>${fromName}<br><span style="color:#999;font-size:12px;">ID: ${fromId}</span></p>
                        <p style="margin-bottom:12px;color:#666;font-size:13px;">この拠点に紐づくデータ:<br>${detail}</p>
                        <div class="form-group">
                            <label>統合先（残る側）</label>
                            <select id="mergeTargetSelect">${optionsHtml}</select>
                        </div>
                        <p style="color:#d32f2f;font-size:13px;margin:12px 0;">
                            ⚠ 統合元の全データ（児童・記録・アセスメント等）の拠点が「統合先」に書き換わります。<br>
                            データ自体は削除されず、locationId のみ変更されます。<br>
                            処理完了後、統合元の拠点（空）は自動削除されます。
                        </p>
                        <div class="modal-actions">
                            <button class="btn" onclick="closeMergeModal()">キャンセル</button>
                            <button class="btn btn-primary" id="mergeExecBtn" onclick="executeMerge('${fromId}','${(fromName || '').replace(/'/g, "\\'")}')">統合を実行</button>
                        </div>
                    </div>
                </div>
            `;
            const wrap = document.createElement('div');
            wrap.innerHTML = html;
            document.body.appendChild(wrap.firstElementChild);
        }

        function closeMergeModal() {
            const m = document.getElementById('mergeLocationModal');
            if (m) m.remove();
        }

        async function executeMerge(fromId, fromName) {
            const toId = document.getElementById('mergeTargetSelect').value;
            if (!toId) return alert('統合先を選択してください');
            const toLoc = locations.find(l => l.id === toId);
            if (!confirm(`「${fromName}」のデータを全て「${toLoc?.name || toId}」に移します。\nこの操作は取り消せません。実行しますか？`)) return;
            const btn = document.getElementById('mergeExecBtn');
            btn.disabled = true;
            btn.textContent = '統合中...';
            try {
                const result = await heartUpDB.mergeLocations(fromId, toId);
                const movedDetail = Object.entries(result.moved).filter(([, v]) => v > 0).map(([k, v]) => `${k}: ${v}件`).join(' / ') || '移動データなし';
                alert(`統合完了\n移動内訳: ${movedDetail}`);
                closeMergeModal();
                await loadAll();
            } catch (e) {
                alert('統合エラー: ' + e.message + '\n\nデータは安全のため統合元に残っています。再試行してください。');
                btn.disabled = false;
                btn.textContent = '統合を実行';
            }
        }

        // ---- スタッフ ----

        async function loadStaff() {
            try {
                const staff = await heartUpDB.getStaffProfiles();
                const tbody = document.getElementById('staffBody');
                if (staff.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="empty-msg">スタッフがいません</td></tr>';
                    return;
                }
                // 同一メールが2件以上ある場合は重複マークを付ける
                const emailCount = {};
                staff.forEach(s => { emailCount[s.email] = (emailCount[s.email] || 0) + 1; });
                tbody.innerHTML = staff.map(s => {
                    const isDup = emailCount[s.email] > 1;
                    const dupBadge = isDup ? '<span style="display:inline-block;background:#ffebee;color:#c62828;padding:2px 6px;border-radius:4px;font-size:11px;margin-left:6px;">重複</span>' : '';
                    return `
                    <tr${isDup ? ' style="background:#fff8f8;"' : ''}>
                        <td>${s.name}${dupBadge}</td>
                        <td>${s.email}</td>
                        <td>
                            <select onchange="changeStaffRole('${s.id}', this.value)" style="padding:4px;font-size:12px;">
                                <option value="staff" ${s.role === 'staff' ? 'selected' : ''}>スタッフ</option>
                                <option value="admin" ${s.role === 'admin' ? 'selected' : ''}>管理者</option>
                            </select>
                        </td>
                        <td>${s.locations?.name || '<span style="color:#999;">未設定</span>'}</td>
                        <td>
                            <select onchange="changeStaffLocation('${s.id}', this.value)" style="padding:4px;font-size:12px;">
                                <option value="">未設定</option>
                                ${locations.map(l => `<option value="${l.id}" ${s.locationId === l.id ? 'selected' : ''}>${l.name}</option>`).join('')}
                            </select>
                        </td>
                        <td>
                            <button class="btn btn-danger btn-sm" onclick="deleteStaff('${s.id}', '${(s.name || '').replace(/'/g, "\\'")}', '${(s.email || '').replace(/'/g, "\\'")}', '${s.role}')">削除</button>
                        </td>
                    </tr>
                    `;
                }).join('');
            } catch (e) {
                console.error('スタッフ読み込みエラー:', e);
            }
        }

        async function changeStaffRole(staffId, role) {
            try {
                await heartUpDB.updateStaffRole(staffId, role);
                await loadStaff();
            } catch (e) {
                alert('ロール変更エラー: ' + e.message);
            }
        }

        async function changeStaffLocation(staffId, locationId) {
            try {
                await heartUpDB.updateStaffLocation(staffId, locationId);
                await loadStaff();
            } catch (e) {
                alert('拠点変更エラー: ' + e.message);
            }
        }

        async function deleteStaff(staffId, name, email, role) {
            const msg = `スタッフプロフィールを削除します。\n\n名前: ${name}\nメール: ${email}\nロール: ${role}\n\n※このプロフィールが児童データを「作成した」記録には影響しません（児童データ自体は残ります）。\n※削除後、本人が再度ログインすると新規登録画面が表示されます。\n\n本当に削除しますか？`;
            if (!confirm(msg)) return;
            try {
                await heartUpDB.deleteStaffProfile(staffId);
                await loadStaff();
            } catch (e) {
                alert('削除エラー: ' + e.message);
            }
        }

        // ---- 招待 ----

        async function loadInvitations() {
            try {
                const invitations = await heartUpDB.getInvitations();
                const tbody = document.getElementById('invitationsBody');
                if (invitations.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="empty-msg">招待がありません</td></tr>';
                    return;
                }
                tbody.innerHTML = invitations.map(i => `
                    <tr>
                        <td>${i.name}</td>
                        <td>${i.email}</td>
                        <td><span class="badge ${i.role === 'admin' ? 'badge-admin' : 'badge-staff'}">${i.role}</span></td>
                        <td>${i.locations?.name || ''}</td>
                        <td><button class="btn btn-danger btn-sm" onclick="deleteInvitation('${i.id}')">取消</button></td>
                    </tr>
                `).join('');
            } catch (e) {
                console.error('招待読み込みエラー:', e);
            }
        }

        function showInviteModal() {
            document.getElementById('inviteEmail').value = '';
            document.getElementById('inviteName').value = '';
            document.getElementById('inviteRole').value = 'staff';
            // 拠点プルダウンを更新
            const sel = document.getElementById('inviteLocation');
            sel.innerHTML = locations.map(l => `<option value="${l.id}">${l.name}</option>`).join('');
            document.getElementById('inviteModal').classList.add('active');
        }

        async function inviteStaff() {
            const email = document.getElementById('inviteEmail').value.trim();
            const name = document.getElementById('inviteName').value.trim();
            const role = document.getElementById('inviteRole').value;
            const locationId = document.getElementById('inviteLocation').value;
            if (!email || !name) return alert('メールと名前は必須です');
            try {
                await heartUpDB.createInvitation(email, name, role, locationId);
                closeModal('inviteModal');
                await loadInvitations();
            } catch (e) {
                alert('招待エラー: ' + e.message);
            }
        }

        async function deleteInvitation(id) {
            if (!confirm('この招待を取り消しますか？')) return;
            try {
                await heartUpDB.deleteInvitation(id);
                await loadInvitations();
            } catch (e) {
                alert('削除エラー: ' + e.message);
            }
        }

        // ---- モーダル ----

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        // ---- テストデータ管理 ----
        
        async function cleanupTestData() {
            if (!confirm('テストデータを整理しますか？\n\n「デップ星人」などの架空の生徒データを削除します。\n※この操作は取り消せません。')) {
                return;
            }
            
            const statusEl = document.getElementById('testDataStatus');
            statusEl.innerHTML = '<span style="color: #2e7d32;">テストデータを整理中...</span>';
            
            try {
                // テストデータのパターン（架空の名前）
                const testPatterns = [
                    'デップ星人', 'テスト', 'test', 'サンプル', 'sample', 'ダミー', 'dummy',
                    '架空', '仮想', '練習', '練習用', '試験', '試験用'
                ];
                
                let deletedCount = 0;
                
                // 生徒データを取得
                const children = await dataAdapter.getChildren();
                const childNames = Object.keys(children);
                
                // テストデータを削除
                for (const name of childNames) {
                    const lowerName = name.toLowerCase();
                    const isTestData = testPatterns.some(pattern =>
                        lowerName.includes(pattern.toLowerCase())
                    );

                    if (isTestData) {
                        try {
                            await dataAdapter.deleteChildAndRelatedData(name);
                            deletedCount++;
                        } catch (e) {
                            console.error(`テストデータ「${name}」の削除エラー:`, e);
                        }
                    }
                }
                
                statusEl.innerHTML = `<span style="color: #2e7d32;">✅ テストデータ整理完了！</span><br>
                <span style="font-size: 12px; color: #666;">${deletedCount}件のテストデータを削除しました。</span>`;
                
            } catch (error) {
                console.error('テストデータ整理エラー:', error);
                statusEl.innerHTML = `<span style="color: #d32f2f;">❌ エラーが発生しました: ${error.message}</span>`;
            }
        }

        // 初期化
        initAdmin();
    </script>
</body>
</html>
